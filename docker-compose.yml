version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python app.py
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5000
    restart: always

  frontend:
    build:
      context: ./frontend
      target: build
    # Run Vite dev server, map to port 5173
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Tell Vite to point to the backend container exposed via localhost on host machine
      # (since the browser accesses it directly)
      - VITE_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend
