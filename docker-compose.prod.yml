version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=5000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Build-time argument pointing to the reverse proxy endpoint
        - VITE_BACKEND_URL=/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
